<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>
</head>
<body>
  <h2>Forgot Password</h2>
  <form id="forgotForm">
    <input type="email" id="email" placeholder="Enter your email" required />
    <button type="submit">Send Reset Link</button>
  </form>

  <p id="message"></p>

  <script>
    const form = document.getElementById('forgotForm');
    const msg = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      msg.textContent = 'Processing...';

      try {
        // تأكد من تشغيل السيرفر على بورت 8000
        const res = await fetch('http://localhost:8000/api/authentication/forgot-password', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json' 
          },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (res.ok) {
          msg.style.color = 'green';
          msg.textContent = data.Message;
        } else {
          msg.style.color = 'red';
          msg.textContent = data.message || 'Error occurred';
        }
      } catch (err) {
        msg.style.color = 'red';
        msg.textContent = 'Connection error. Make sure server is running.';
        console.error(err);
      }
    });
  </script>
</body>
</html>
